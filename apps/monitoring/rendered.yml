kind: ConfigMap
metadata:
  name: k8s-monitoring-alloy-metrics
  namespace: monitoring
---
apiVersion: v1
data:
  config.alloy: |
    // Feature: Cluster Events
    declare "cluster_events" {
      argument "logs_destinations" {
        comment = "Must be a list of log destinations where collected logs should be forwarded to"
      }

      loki.source.kubernetes_events "cluster_events" {
        job_name   = "integrations/kubernetes/eventhandler"
        log_format = "logfmt"
        forward_to = [loki.process.cluster_events.receiver]
      }

      loki.process "cluster_events" {

        // add a static source label to the logs so they can be differentiated / restricted if necessary
        stage.static_labels {
          values = {
            "source" = "kubernetes-events",
          }
        }

        // extract some of the fields from the log line, these could be used as labels, structured metadata, etc.
        stage.logfmt {
          mapping = {
            "component" = "sourcecomponent", // map the sourcecomponent field to component
            "kind" = "",
            "level" = "type", // most events don't have a level but they do have a "type" i.e. Normal, Warning, Error, etc.
            "name" = "",
            "node" = "sourcehost", // map the sourcehost field to node
            "reason" = "",
          }
        }
        // set the extracted values as labels
        stage.labels {
          values = {
            "kind" = "",
            "level" = "",
            "service_name" = "job",
            "reason" = "reason",
          }
        }

        // if kind=Node, set the node label by copying the name field
        stage.match {
          selector = "{kind=\"Node\"}"

          stage.labels {
            values = {
              "node" = "name",
            }
          }
        }

        // set the level extracted key value as a normalized log level
        stage.match {
          selector = "{level=\"Normal\"}"

          stage.static_labels {
            values = {
              level = "Info",
            }
          }
        }
        stage.structured_metadata {
          values = {
            "name" = "name",
            "node" = "node",
          }
        }

        // Drop pipeline-only labels that are not needed in the final output.
        stage.label_drop {
          values = ["kind"]
        }

        forward_to = argument.logs_destinations.value
      }
    }
    cluster_events "feature" {
      logs_destinations = [
        loki.write.grafana_cloud_loki.receiver,
      ]
    }
    // Self Reporting
    prometheus.exporter.unix "kubernetes_monitoring_telemetry" {
      set_collectors = ["textfile"]
      textfile {
        directory = "/etc/release-info"
      }
    }

    discovery.relabel "kubernetes_monitoring_telemetry" {
      targets = prometheus.exporter.unix.kubernetes_monitoring_telemetry.targets
      rule {
        target_label = "instance"
        action = "replace"
        replacement = "k8s-monitoring"
      }
      rule {
        target_label = "job"
        action = "replace"
        replacement = "integrations/kubernetes/kubernetes_monitoring_telemetry"
      }
    }

    prometheus.scrape "kubernetes_monitoring_telemetry" {
      job_name   = "integrations/kubernetes/kubernetes_monitoring_telemetry"
      targets    = discovery.relabel.kubernetes_monitoring_telemetry.output
      scrape_interval = "15s"
      clustering {
        enabled = true
      }
      forward_to = [prometheus.relabel.kubernetes_monitoring_telemetry.receiver]
    }

    prometheus.relabel "kubernetes_monitoring_telemetry" {
      rule {
        source_labels = ["__name__"]
        regex = "grafana_kubernetes_monitoring_.*"
        action = "keep"
      }
      forward_to = [
        prometheus.remote_write.cloud_prometheus.receiver,
      ]
    }




    // Destination: cloud-prometheus (prometheus)
    otelcol.exporter.prometheus "cloud_prometheus" {
      add_metric_suffixes = true
      resource_to_telemetry_conversion = false
      forward_to = [prometheus.remote_write.cloud_prometheus.receiver]
    }

    prometheus.remote_write "cloud_prometheus" {
      endpoint {
        url = "https://prometheus.dan-nixon.com/write"
        headers = {
        }
        basic_auth {
          username = convert.nonsensitive(remote.kubernetes.secret.cloud_prometheus.data["username"])
          password = remote.kubernetes.secret.cloud_prometheus.data["password"]
        }
        tls_config {
          insecure_skip_verify = false
        }
        send_native_histograms = false

        queue_config {
          capacity = 10000
          min_shards = 1
          max_shards = 50
          max_samples_per_send = 2000
          batch_send_deadline = "5s"
          min_backoff = "30ms"
          max_backoff = "5s"
          retry_on_http_429 = true
          sample_age_limit = "0s"
        }

        write_relabel_config {
          source_labels = ["cluster"]
          regex = ""
          replacement = "makerspace-on-prem"
          target_label = "cluster"
        }
        write_relabel_config {
          source_labels = ["k8s_cluster_name"]
          regex = ""
          replacement = "makerspace-on-prem"
          target_label = "k8s_cluster_name"
        }
      }

      wal {
        truncate_frequency = "2h"
        min_keepalive_time = "5m"
        max_keepalive_time = "8h"
      }
    }

    remote.kubernetes.secret "cloud_prometheus" {
      name      = "cloud-prometheus-k8s-monitoring"
      namespace = "monitoring"
    }


    // Destination: grafana-cloud-loki (loki)
    otelcol.exporter.loki "grafana_cloud_loki" {
      forward_to = [loki.write.grafana_cloud_loki.receiver]
    }

    loki.write "grafana_cloud_loki" {
      endpoint {
        url = "https://logs-prod-035.grafana.net/loki/api/v1/push"
        retry_on_http_429 = true
        basic_auth {
          username = convert.nonsensitive(remote.kubernetes.secret.grafana_cloud_loki.data["username"])
          password = remote.kubernetes.secret.grafana_cloud_loki.data["password"]
        }
        tls_config {
          insecure_skip_verify = false
        }
        min_backoff_period = "500ms"
        max_backoff_period = "5m"
        max_backoff_retries = "10"
      }
      external_labels = {
        "cluster" = "makerspace-on-prem",
        "k8s_cluster_name" = "makerspace-on-prem",
      }
    }

    remote.kubernetes.secret "grafana_cloud_loki" {
      name      = "grafana-cloud-loki-k8s-monitoring"
      namespace = "monitoring"
    }
